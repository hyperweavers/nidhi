codecov:
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: '70...100'
  status:
    project:
      default:
        target: auto
        threshold: 2%
      pangu:
        target: auto
        threshold: 2%
        flags:
          - pangu
      palan:
        target: auto
        threshold: 2%
        flags:
          - palan
      vatti:
        target: auto
        threshold: 2%
        flags:
          - vatti
      shared-logger:
        target: auto
        threshold: 2%
        flags:
          - shared-logger
      shared-sentry:
        target: auto
        threshold: 2%
        flags:
          - shared-sentry
    patch:
      default:
        target: auto
        threshold: 2%

flags:
  pangu:
    paths:
      - apps/pangu
    carryforward: true
  palan:
    paths:
      - apps/palan
    carryforward: true
  vatti:
    paths:
      - apps/vatti
    carryforward: true
  shared-logger:
    paths:
      - libs/shared/logger
    carryforward: true
  shared-sentry:
    paths:
      - libs/shared/sentry
    carryforward: true

bundle_analysis:
  warning_threshold: '5%'
  status: 'informational'

comment:
  layout: 'reach, diff, flags, files'
  behavior: default
  require_changes: false
  show_carryforward_flags: true
