name: Deploy

on:
  push:
    branches:
      - main
      - release/*

permissions:
  contents: write

jobs:
  find-affected-apps:
    name: Find Affected Apps
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.affected-apps.outputs.apps }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js Environment
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm' # Cache node_modules

      - name: Install Dependencies
        run: npm ci

      - name: Set NX SHAs
        uses: nrwl/nx-set-shas@v5

      - name: Detect Affected Apps
        id: affected-apps
        run: |
          affected=$(npx --yes nx show projects --affected --type app --base=origin/main~1 --head=origin/main --json)
          echo "apps=$affected" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy
    needs: find-affected-apps
    if: needs.find-affected-apps.outputs.apps != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ${{ fromJson(needs.find-affected-apps.outputs.apps) }}

    steps:
      - name: Checkout
        # Latest version v6 introduced a breaking change in credentials storage that
        # affects the deploy action. Until, deploy action fixes it, sticking with v5.
        uses: actions/checkout@v5

      - name: Setup Node.js Environment
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm' # Cache node_modules

      - name: Install Dependencies
        run: npm ci

      - name: Lint and Run Unit Tests
        run: npx nx affected --target=lint,test --parallel

      # Disabled e2e tests until available
      # - name: Lint and Run Unit & E2E Tests
      #   run: npx nx affected --target=lint,test,e2e-ci --parallel

      - name: Bump Version
        id: bump-version
        run: |
          NEW_VERSION=$(node tools/scripts/bump-version.mjs ${{ matrix.app }})
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build ${{ matrix.app }} App
        run: npx nx build ${{ matrix.app }} --configuration production --base-href ./

      - name: Upload Source Maps to Sentry
        if: steps.bump-version.outputs.version != ''
        env:
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          npx @sentry/cli releases new "${{ steps.bump-version.outputs.version }}" \
            --org "$SENTRY_ORG" --project "${{ matrix.app }}"
          npx @sentry/cli releases files "${{ steps.bump-version.outputs.version }}" \
            upload-sourcemaps dist/apps/${{ matrix.app }}/browser \
            --url-prefix '~/browser' --validate \
            --org "$SENTRY_ORG" --project "${{ matrix.app }}"
          npx @sentry/cli releases finalize "${{ steps.bump-version.outputs.version }}" \
            --org "$SENTRY_ORG" --project "${{ matrix.app }}"

      - name: Remove Source Maps from Deploy Artifact
        run: find dist/apps/${{ matrix.app }}/browser -name '*.map' -delete

      - name: Commit Version Bump
        if: steps.bump-version.outputs.version != ''
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add apps/${{ matrix.app }}/version
          git commit -m "chore: bump ${{ matrix.app }} to ${{ steps.bump-version.outputs.version }} [skip ci]"
          git push

      - name: Prepare ${{ matrix.app }} App for Deployment
        run: |
          cd dist/apps/${{ matrix.app }}/browser
          cp index.html 404.html

      - name: Deploy ${{ matrix.app }} App
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GH_NIDHI_DEPLOYMENT_TOKEN }}
          folder: dist/apps/${{ matrix.app }}/browser
          repository-name: 'hyperweavers/${{ matrix.app }}-site'
          branch: 'main'
          commit-message: 'Deploy ${{ matrix.app }} App 🚀'
          clean-exclude: |
            README.md
            LICENSE
            CNAME
