name: Deploy

on:
  push:
    branches:
      - main
      - release/*

permissions:
  contents: write

jobs:
  find-affected-apps:
    name: Find Affected Apps
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.affected-apps.outputs.apps }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2

      - name: Setup Node.js Environment
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Set NX SHAs
        uses: nrwl/nx-set-shas@v5

      - name: Detect Affected Apps
        id: affected-apps
        run: |
          affected=$(pnpm nx show projects --affected --type app --base=origin/main~1 --head=origin/main --json)
          echo "apps=$affected" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy
    needs: find-affected-apps
    if: needs.find-affected-apps.outputs.apps != '[]'
    runs-on: ubuntu-latest
    env:
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN_READ_WRITE }}
    strategy:
      matrix:
        app: ${{ fromJson(needs.find-affected-apps.outputs.apps) }}

    steps:
      - name: Checkout
        # Latest version v6 introduced a breaking change in credentials storage that
        # affects the deploy action. Until, deploy action fixes it, sticking with v5.
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v2

      - name: Setup Node.js Environment
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and Run Unit Tests
        run: pnpm nx affected -t lint test --parallel

      - name: Upload coverage and test results to Codecov
        env:
          CODECOV_VERSION: ${{ vars.CODECOV_VERSION }}
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          CODECOV_GPG_FINGERPRINT: ${{ vars.CODECOV_GPG_FINGERPRINT }}
          CODECOV_GPG_KEY: ${{ vars.CODECOV_GPG_KEY }}
        run: |
          echo "Setting up GPG and downloading Codecov CLI..."
          export GNUPGHOME=$(mktemp -d)

          # Write GPG key from variable and verify fingerprint
          printf '%s\n' "$CODECOV_GPG_KEY" > /tmp/codecov_pgp.asc
          gpg --import /tmp/codecov_pgp.asc
          gpg --fingerprint "Codecov Uploader" | tr -s ' ' | \
            grep -q "$CODECOV_GPG_FINGERPRINT" || {
              echo "ERROR: Codecov GPG key fingerprint mismatch"
              exit 1
            }

          # Export to old-style trustedkeys.gpg for gpgv
          gpg --export > "$GNUPGHOME/trustedkeys.gpg"

          # Download and verify binary
          curl -Os "https://cli.codecov.io/${CODECOV_VERSION}/linux/codecov"
          curl -Os "https://cli.codecov.io/${CODECOV_VERSION}/linux/codecov.SHA256SUM"
          curl -Os "https://cli.codecov.io/${CODECOV_VERSION}/linux/codecov.SHA256SUM.sig"
          gpgv codecov.SHA256SUM.sig codecov.SHA256SUM
          sha256sum -c codecov.SHA256SUM
          chmod +x codecov
          echo "Codecov CLI download and verification OK"

          echo "Uploading coverage"
          echo "Checking coverage/apps/*/ for clover.xml..."
          for dir in coverage/apps/*/; do
            if [ -d "$dir" ]; then
              flag=$(basename "$dir")
              if [ -f "$dir/clover.xml" ]; then
                echo "FOUND: $dir/clover.xml, uploading as flag=$flag"
                ./codecov upload-process --disable-search -Z -f "$dir/clover.xml" -F "$flag"
                echo "UPLOAD OK: $flag coverage"
              else
                echo "SKIP: $dir — no clover.xml found"
              fi
            fi
          done
          echo "Checking coverage/libs/*/*/ for clover.xml..."
          for dir in coverage/libs/*/*/; do
            if [ -d "$dir" ]; then
              lib=$(basename "$dir")
              parent=$(basename "$(dirname "$dir")")
              flag="${parent}-${lib}"
              if [ -f "$dir/clover.xml" ]; then
                echo "FOUND: $dir/clover.xml, uploading as flag=$flag"
                ./codecov upload-process --disable-search -Z -f "$dir/clover.xml" -F "$flag"
                echo "UPLOAD OK: $flag coverage"
              else
                echo "SKIP: $dir — no clover.xml found"
              fi
            fi
          done

          echo "Uploading test results"
          echo "Checking test-results/apps/*/ for junit.xml..."
          for dir in test-results/apps/*/; do
            if [ -d "$dir" ]; then
              flag=$(basename "$dir")
              if [ -f "$dir/junit.xml" ]; then
                echo "FOUND: $dir/junit.xml, uploading as flag=$flag"
                ./codecov do-upload --report-type test_results --disable-search -Z \
                  -f "$dir/junit.xml" -F "$flag"
                echo "UPLOAD OK: $flag test results"
              else
                echo "SKIP: $dir — no junit.xml found"
              fi
            fi
          done
          echo "Checking test-results/libs/*/*/ for junit.xml..."
          for dir in test-results/libs/*/*/; do
            if [ -d "$dir" ]; then
              lib=$(basename "$dir")
              parent=$(basename "$(dirname "$dir")")
              flag="${parent}-${lib}"
              if [ -f "$dir/junit.xml" ]; then
                echo "FOUND: $dir/junit.xml, uploading as flag=$flag"
                ./codecov do-upload --report-type test_results --disable-search -Z \
                  -f "$dir/junit.xml" -F "$flag"
                echo "UPLOAD OK: $flag test results"
              else
                echo "SKIP: $dir — no junit.xml found"
              fi
            fi
          done

      # Disabled e2e tests until available
      # - name: Lint and Run Unit & E2E Tests
      #   run: pnpm nx affected --target=lint,test,e2e-ci --parallel

      - name: Bump Version
        id: bump-version
        run: |
          NEW_VERSION=$(node tools/scripts/bump-version.mjs ${{ matrix.app }})
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build ${{ matrix.app }} App
        env:
          SENTRY_DSN: ${{ vars[format('SENTRY_DSN_{0}', matrix.app)] }}
        run: |
          if [ -z "$SENTRY_DSN" ]; then
            echo "Error: SENTRY_DSN_$(echo '${{ matrix.app }}' | tr '[:lower:]' '[:upper:]') GitHub Variable is not set"
            exit 1
          fi
          pnpm nx build ${{ matrix.app }} --configuration production --base-href ./

      - name: Upload bundle analysis to Codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          pnpx @codecov/bundle-analyzer dist/apps/${{ matrix.app }}/browser \
            --bundle-name ${{ matrix.app }} \
            --upload-token "$CODECOV_TOKEN"

      - name: Upload Source Maps to Sentry
        if: steps.bump-version.outputs.version != ''
        env:
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          pnpm sentry-cli releases new "${{ steps.bump-version.outputs.version }}" \
            --org "$SENTRY_ORG" --project "${{ matrix.app }}"
          pnpm sentry-cli sourcemaps upload \
            --release "${{ steps.bump-version.outputs.version }}" \
            --org "$SENTRY_ORG" \
            --project "${{ matrix.app }}" \
            --url-prefix '~/browser' \
            dist/apps/${{ matrix.app }}/browser
          pnpm sentry-cli releases finalize "${{ steps.bump-version.outputs.version }}" \
            --org "$SENTRY_ORG" --project "${{ matrix.app }}"

      - name: Remove Source Maps from Deploy Artifact
        run: find dist/apps/${{ matrix.app }}/browser -name '*.map' -delete

      - name: Commit Version Bump
        if: steps.bump-version.outputs.version != ''
        run: |
          if ! git diff --quiet apps/${{ matrix.app }}/version; then
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add apps/${{ matrix.app }}/version
            git commit -m "chore: bump ${{ matrix.app }} to ${{ steps.bump-version.outputs.version }} [skip ci]"
            git push
          fi

      - name: Prepare ${{ matrix.app }} App for Deployment
        run: |
          cd dist/apps/${{ matrix.app }}/browser
          cp index.html 404.html

      - name: Deploy ${{ matrix.app }} App
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GH_NIDHI_DEPLOYMENT_TOKEN }}
          folder: dist/apps/${{ matrix.app }}/browser
          repository-name: 'hyperweavers/${{ matrix.app }}-site'
          branch: 'main'
          commit-message: 'Deploy ${{ matrix.app }} App 🚀'
          clean-exclude: |
            README.md
            LICENSE
            CNAME
