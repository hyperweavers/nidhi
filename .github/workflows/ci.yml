name: CI

on:
  pull_request:

# Needed for nx-set-shas when run on the main branch
permissions:
  actions: read
  contents: read

jobs:
  format-lint-build-test:
    name: Format, Lint, Build & Test
    runs-on: ubuntu-latest
    env:
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN_READ_ONLY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup NX Cloud
        # Linux agents: https://github.com/nrwl/nx-cloud-workflows/blob/main/launch-templates/linux.yaml
        # CLI Rf: https://nx.dev/ci/reference/nx-cloud-cli
        # Ref: https://nx.dev/ci/reference/nx-cloud-cli#stopagentsafter
        run: npx nx-cloud start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="lint,build,test"
        # Replace above command with the below one when e2e tests are available
        # run: npx nx-cloud start-ci-run --distribute-on="4 linux-medium-js" --stop-agents-after="lint,build,test,e2e-ci"

      - name: Setup Node.js Environment
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm' # Cache node_modules

      - name: Install Dependencies
        run: npm ci

      - name: Set NX SHAs
        uses: nrwl/nx-set-shas@v5

      - name: Set Tracking Branch for NX
        if: ${{ github.event_name == 'pull_request' }}
        run: git branch --track main origin/main

      - name: Format
        run: npx nx-cloud record -- nx format:check

      - name: Lint and Run Unit Tests
        run: npx nx affected -t lint test --parallel

      - name: Build
        run: npx nx affected -t build --configuration=production --parallel

      - name: Restore artifacts from Nx Cloud cache
        if: always()
        run: |
          npx nx affected -t test
          npx nx affected -t build --configuration=production

      - name: Upload coverage and test results to Codecov
        if: always()
        env:
          CODECOV_VERSION: ${{ vars.CODECOV_VERSION }}
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          CODECOV_GPG_FINGERPRINT: ${{ vars.CODECOV_GPG_FINGERPRINT }}
          CODECOV_GPG_KEY: ${{ vars.CODECOV_GPG_KEY }}
        run: |
          # Write GPG key from variable and verify fingerprint
          echo "$CODECOV_GPG_KEY" > /tmp/codecov_pgp.asc
          gpg --no-default-keyring --keyring trustedkeys.gpg --import /tmp/codecov_pgp.asc
          gpg --no-default-keyring --keyring trustedkeys.gpg --fingerprint "Codecov Uploader" | \
            grep -q "$CODECOV_GPG_FINGERPRINT" || {
              echo "ERROR: Codecov GPG key fingerprint mismatch"
              exit 1
            }

          # Download and verify binary
          curl -Os "https://cli.codecov.io/${CODECOV_VERSION}/linux/codecov"
          curl -Os "https://cli.codecov.io/${CODECOV_VERSION}/linux/codecov.SHA256SUM"
          curl -Os "https://cli.codecov.io/${CODECOV_VERSION}/linux/codecov.SHA256SUM.sig"
          gpgv --keyring ./trustedkeys.gpg codecov.SHA256SUM.sig codecov.SHA256SUM
          sha256sum -c codecov.SHA256SUM
          chmod +x codecov

          # Upload coverage (per-project flags)
          for dir in coverage/apps/*/; do
            if [ -f "$dir/clover.xml" ]; then
              ./codecov upload-process --disable-search -Z -f "$dir/clover.xml" -F "$(basename "$dir")"
            fi
          done
          for dir in coverage/libs/*/*/; do
            if [ -f "$dir/clover.xml" ]; then
              lib="$(basename "$dir")"
              parent="$(basename "$(dirname "$dir")")"
              ./codecov upload-process --disable-search -Z -f "$dir/clover.xml" -F "${parent}-${lib}"
            fi
          done

          # Upload test results (per-project flags)
          for dir in test-results/apps/*/; do
            if [ -f "$dir/junit.xml" ]; then
              ./codecov do-upload --report-type test_results --disable-search -Z \
                -f "$dir/junit.xml" -F "$(basename "$dir")"
            fi
          done
          for dir in test-results/libs/*/*/; do
            if [ -f "$dir/junit.xml" ]; then
              lib="$(basename "$dir")"
              parent="$(basename "$(dirname "$dir")")"
              ./codecov do-upload --report-type test_results --disable-search -Z \
                -f "$dir/junit.xml" -F "${parent}-${lib}"
            fi
          done

      - name: Upload bundle analysis to Codecov
        if: always()
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          for dir in dist/apps/*/browser; do
            if [ -d "$dir" ]; then
              app="${dir#dist/apps/}"
              app="${app%/browser}"
              npx @codecov/bundle-analyzer "$dir" \
                --bundle-name "$app"
            fi
          done

      # Disabled e2e tests until available
      # - name: Lint, Build and Run Unit & E2E Tests
      #   Ref: https://nx.dev/ci/reference/nx-cloud-cli#stopagentsafter
      #   run: nx affected -t lint & npx nx affected -t build & npx nx affected -t test & npx nx affected -t e2e-ci
